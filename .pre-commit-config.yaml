# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# Don't run pre-commit on files under third-party/
exclude: "^\
  (third-party/.*)\
  "

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-toml  # Checks toml files for parseable syntax
      - id: check-json  # Checks json files for parseable syntax
      - id: check-added-large-files  # Prevents giant files from being committed
      - id: check-case-conflict  # Checks for files that would conflict in case-insensitive filesystems
      - id: check-merge-conflict  # Checks for files that contain merge conflict strings
      - id: check-yaml  # Checks yaml files for parseable syntax
      - id: detect-private-key  # Detects the presence of private keys
      - id: end-of-file-fixer  # Ensures that a file is either empty, or ends with one newline
      - id: fix-byte-order-marker  # Removes utf-8 byte order marker
      - id: mixed-line-ending  # Replaces or checks mixed line ending
      - id: trailing-whitespace  # Trims trailing whitespace

  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.29.4
    hooks:
      - id: check-github-actions # Checks GitHub Actions workflow files against the GitHub Actions workflow schema
      - id: check-github-workflows # Checks GitHub Workflows for common errors and best practices

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.30
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --config=pyproject.toml]
      - id: ruff-format
        args: [--config=pyproject.toml]

  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [
          "-f", "custom",
          "-o", "bandit-report.txt",
          "-x", "test/",
          "--recursive",
          "--severity-level", "medium"
        ]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [
          "--baseline", ".secrets.baseline"
        ] # Scans for secrets using a baseline file
